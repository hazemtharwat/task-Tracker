<div class="p-3 CreateNewTaskContainer">
  <form (ngSubmit)="onsubmit()" [formGroup]="CreateTaskFrom" >
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="mt-3">Create New Task</h1>
        <button mat-fab="elevated" type="submit" class="addtaskBtn fs-3 bg-primary p-0">
      <mat-icon>check_small</mat-icon>
    </button>
  </div>
      <div class="row d-flex justify-content-between ">
        <div class="col-md-6 ">
          <mat-form-field appearance="fill" class=" form-control" >
            <input matInput type="text" formControlName="title" placeholder="type anyThing .." />
          </mat-form-field>
        </div>
        <div class="col-md-3 ">
          <mat-form-field appearance="fill"  class=" form-control">
            <input matInput [matDatepicker]="picker" formControlName="date" placeholder="Choose a date" />
            <mat-hint>MM/DD/YYYY</mat-hint>
            <mat-datepicker-toggle
              matIconSuffix
              [for]="picker"
            ></mat-datepicker-toggle>
            <mat-datepicker #picker></mat-datepicker>
          </mat-form-field>
        </div>
        <div class="col-md-3 ">
          <mat-form-field appearance="fill" class=" form-control">
            <mat-select formControlName="Priority" placeholder="Priority">
              <mat-option value="Hight">Hight</mat-option>
              <mat-option value="Meduim">Meduim</mat-option>
              <mat-option value="Low">Low</mat-option>
            </mat-select>
          </mat-form-field>
        </div>
      </div>

  </form>
</div>
